# postgres-pod.yaml
apiVersion: v1
kind: Pod
metadata:
  name: postgres
  namespace: bctl-app
  labels:
    app: postgres
spec:
  nodeSelector:
    kubernetes.io/hostname: k8s-worker2
  containers:
  - name: postgres
    image: postgres:14
    ports:
    - containerPort: 5432
    env:
    - name: POSTGRES_USER
      value: "admin"
    - name: POSTGRES_PASSWORD
      value: "admin"
    - name: POSTGRES_DB
      value: "bctl_db"
    - name: POSTGRES_HOST_AUTH_METHOD
      value: "trust"           # authentification sans mot de passe (intentionnel)

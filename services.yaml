# services.yaml
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: bctl-app
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api-backend-svc
  namespace: bctl-app
spec:
  selector:
    app: api-backend
  ports:
  - port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: bctl-app
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
